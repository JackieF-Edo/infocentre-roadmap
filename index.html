esult. See attached email and recording for more info.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "11/19/2025", "customer": "", "acceptanceCriteria": "", "comments": "[19/Nov/25 4:33 PM] fyi, added bug", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-568", "epic": "", "summary": "Increase Character Limit for 'Additional Dispatch Details' Field", "description": "As a CSC, when adding notes to a dispatch, I want more characters in the ‘Additional Dispatch Details’ field so that I don’t run out of room when adding text. Requested by Doug M (This is on the Work Order object)", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "11/18/2025", "customer": "", "acceptanceCriteria": "", "comments": "[18/Nov/25 2:04 PM] fyi, added", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-565", "epic": "", "summary": "Experience Cloud - Sorting Inconsistent on Service Type Dispatches Related List", "description": "When looking at the Service Type Dispatches related list from the Service Type record page, sorting is inconsistent (see example below - Warranty is not correctly sorted by display order but Regular is). Reported by Angela S. Steps to reproduce: # In the portal, go to an account record with Work Typ", "status": "New", "priority": "Lowest", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "11/14/2025", "customer": "", "acceptanceCriteria": "", "comments": "[14/Nov/25 9:39 AM] fyi, added bug reported by Angela S", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-560", "epic": "", "summary": "Status Bar Does Not Display Status on Mortenson WO", "description": "Doug reports that sometimes on Mortenson WOs, the status bar does not display the current status. He hasn’t noticed a pattern when it does occur, just that it does on occasion. See screenshots and WO-01744121 as an example.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "10/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "[31/Oct/25 4:13 PM] fyi, bug report from Doug cc", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-555", "epic": "", "summary": "Vendor Can See Temp Notes on Account", "description": "Problem: Vendor can see Temp Notes field on Account record. Steps to Reproduce: Log in as vendor. View an account record, note that you can see the Temp Notes. Problem Configuration: Contact RT = Vendor/Technician Building role = Vendor * Profile = Edo Community Vendor Company User", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "10/23/2025", "customer": "", "acceptanceCriteria": "", "comments": "[23/Oct/25 1:09 PM] fyi, added bug", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-550", "epic": "", "summary": "Column 'Service Request Number' in Queues Does Not Sort Properly", "description": "Problem: Column ‘Service Request Number’ in queues on home page doesn’t sort properly. Root Cause: This is because it’s a hyperlink under the hood and Salesforce sorts by the hyperlink, not the SR number itself. Steps to Reproduce: Go to console home page. In any of the queues, click on column heade", "status": "New", "priority": "Lowest", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "10/22/2025", "customer": "", "acceptanceCriteria": "", "comments": "[22/Oct/25 8:13 AM] fyi, added bug, lowest priority", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-541", "epic": "", "summary": "RITM0025559 Only allow asset entry in one place", "description": "Requesting Customer: Hillsborough County Public Schools User Story: Currently there are two spots where assets can be entered, which can cause confusion. We would like to have only one section to enter assets", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "10/10/2025", "customer": "Hillsborough County Public Schools", "acceptanceCriteria": "Remove the asset entry option on the left Allow users to add assets on the right side of the page where you can add multiple assets", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-536", "epic": "", "summary": "Spike - Actions when Attachments are Added to SR/WO", "description": "What do we want to do when attachment(s) are added to a SR/WO? Like in the use case of a warranty, where a user has a bunch of pictures they want to attach as proof. Notify the CSC? Copy files from SR to WO? What’s the record we want the user to add attachments to - SR or WO? Etc… (issue brought up ", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "10/03/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-533", "epic": "", "summary": "Update Notification Flow at the Service Request Level ", "description": "Requesting Customer: Lake Washington School District User Story: When a requestor opens a ticket for a temp concern and the ROC escalates to on-site, the requestor receives an email notice that the work was completed on the parent ticket. This causes confusion/concern as their issue is not completed", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "09/15/2025", "customer": "", "acceptanceCriteria": "Rewrite the notification flow so that requestors are only notified when their service request is closed, not when individual work orders are completed. I’ll work on getting an estimated timeline for this update.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-529", "epic": "", "summary": "Duplicate Dispatch CC Notifications", "description": "Duplicate “Work Order Dispatch Information - CC'd” emails being received. See attached for example.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "09/03/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-528", "epic": "", "summary": "Preventive Maintenance Enhancements", "description": "", "status": "Ready For Development", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "09/03/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-525", "epic": "IF-528", "summary": "PM Email: Subject Line ", "description": "Requesting Customer: Lake Washington School District User Story: The user requested that the subject line includes the title of the PM for descriptive information. Currently, they have to click into the email and the description is very small font in the middle or down at the bottom of the email. Pr", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "08/28/2025", "customer": "", "acceptanceCriteria": "When one PM is generated and an email is sent out to the technician please have the subject line of the email distinguish the PM title.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-524", "epic": "IF-528", "summary": "Preventative Maintenance Email Notification", "description": "Requesting Customer: Lake Washington School District User Story: In the previous platform the PMs were sent out in one email in a list of all the PMs generated for that date. The grounds team can get many PMs generated in a day and it was easy to view the one email with a list. Currently, in ICE it ", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "08/28/2025", "customer": "", "acceptanceCriteria": "When a PM is generated to the same group of people send out one email with a list of the PMs generated rather than one email per PM generated", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-523", "epic": "", "summary": "Multiple Entry - Labor", "description": "Requesting Customer: Lake Washington School District User Story: The LWSD ground team often adds up to 5-6 entries on the same work order for the same amount of labor for different members. It can be time consuming as they do it daily on several work orders for several staff per work order.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "08/28/2025", "customer": "", "acceptanceCriteria": "The ability to add labor hours for multiple team members in bulk. They should be able to add the same amount of hours for the same date on the work order for multiple people rather than one at a time.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-521", "epic": "", "summary": "Alarm Emails for PPS not harvesting - HOTFIX", "description": "Currently, PPS alarm E-mails are coming and disappearing due to a lack of Facility or Asset Ids in the Email. And the current Apex code does not have the ability to catch and forward these errors to the inbox. This hotfix is to ensure those emails are properly forwarded while we fix the issue of the", "status": "Blocked", "priority": "High", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "08/26/2025", "customer": "", "acceptanceCriteria": "", "comments": "[10/Nov/25 7:57 AM] Note from Alec: No new updates from PPS regarding this. But discussion will be continuing soon in the next couple of weeks.\n\n[26/Jan/26 9:08 AM] connect with Alec on this one, for now moving to backlog as ‘blocked’", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-514", "epic": "", "summary": "Delay Dispatch: Status and ECD Set", "description": "Requesting Customer: Edo User Story: As a CSC, i want to be able to select that status and the estimated completion date that a work order will automatically go to after a delay dispatch email is sent out.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "08/26/2025", "customer": "", "acceptanceCriteria": "EX: when i schedule a delay dispatch for a technician for 8am tomorrow, i want to also be able to select that the status would change to acknowledge after the email is sent and that the ECD is updated to 1 week in the future. So at 8am tomorrow, the email would be dispatched, the status of the wok order would change to acknowledged, and the estimated completion date would show 1 week from today", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-510", "epic": "", "summary": "Building Information on List View", "description": "Requesting Customer: UW School of Medicine - SLU User Story: I want to be able to easily determine what building the work order or service request is for via list view", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "08/22/2025", "customer": "", "acceptanceCriteria": "I want to be able to easily determine what building the work order or service request is for via list view- right now the limitations in list views are account name, service territory. the building field is not always reliable.", "comments": "[30/Sep/25 1:23 PM] and for reporting (for proposals)", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-503", "epic": "", "summary": "Community - Service Request - Back/Previous Function - Save State - Internal", "description": "For any level role,, I want to go back to the previous location page from SR Requestor page, so that I can check or change the location information. Current Behavior: Choose the SR location, go to Page to enter the requestor and issue information. However, if you took the information on a call for e", "status": "New", "priority": "Medium", "storyPoints": "2", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "08/18/2025", "customer": "", "acceptanceCriteria": "Include Account Selected on the Get Service Request Information screen Add a previous button to the Get Service Request Information screen Create a save state on the Get Service Request Information screen so that when the user goes to the previous page, the data on the Get Service Request Information screen is not lost. See the video for additional areas needing solutions to ensure they are not lo", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-502", "epic": "", "summary": "McKinstry HCPS - Active Ops Warranty", "description": "|RITM0024646| |Warranty Workflow|As a controller, I need the ability to report on the following: Number of warranty issues Issues reported as warranty but were determined Non-warranty Issues orgionaly reported as Non-warranty but were later flagged as warranty| |RITM0024646| |Warranty Workflow|Work ", "status": "Ready For Development", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "08/18/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-493", "epic": "", "summary": "LWSD - Require Labor and Assets on WO Before Completion", "description": "Labor and assets to need to be added to a work order prior to it being completed for LWSD (They had the labor requirements in 4.0) - Alec E", "status": "Ready For Development", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "08/11/2025", "customer": "", "acceptanceCriteria": "", "comments": "[05/Sep/25 4:08 PM] Does LWSD still have labor requirements for completing their work orders? I thought I heard not.", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-485", "epic": "", "summary": "Expire Temporary Procedure Note When Related Work Order Is Complete", "description": "As a CSC, I want an automated way to expire a Temporary Procedure Note related to a Work Order when that Work Order is completed, so that I don’t have to manually expire the note. Example: ‘(7/15/25 until WO 01543150 is complete) Please disregard any AHU-7 or FTU7 alarms until WO 01543150 is complet", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "08/05/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-482", "epic": "", "summary": "Easier Way to Update ECD on Work Order", "description": "As a CSC, I want an easier way to update the ECD on a work order so I don’t forget to add the date (required for LWSD). Potential solutions: Add ECD field to Dispatch flow on the screen where you select a technician Add a component on the right side of the Work Order page layout to update the ECD Fo", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "[05/Sep/25 4:06 PM] We can use this to support the influx of LWSD orders, as this is critical to their procedures unlike other clients.", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-481", "epic": "", "summary": "Standardize List Views", "description": "As a CSC, I want standardized list views so that they display the same for each object, regardless of where I click. (example: clicking on the related list for Service Requests from an Account record produces a list view with different columns than clicking on the Service Request list view from the ", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-480", "epic": "", "summary": "Temporary Procedure Notes - Prevent Users from Creating Note on Wrong Account", "description": "As a CSC, I want avoid creating a Temporary Procedure Note on the wrong account so that notes are accurately displayed and info is not lost. Potential solutions: remove related list from accounts that should not have notes related to them (use conditional visibility on related list), or create guide", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-478", "epic": "", "summary": "Scrub Internal Work Order Fields", "description": "As a CSC, I want to optimize the fields displayed on a Work Order record so that I don’t see unneeded data.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-474", "epic": "", "summary": "Dispatch Flow Update - Procedure Notes", "description": "As a CSC, I want the following updates to the way that temporary notes appear when the dispatch flow is run, so that I can more effectively hand a dispatch: First screen Customer Notes (add collapsibility for customer notes) Site Notes Third screen (where you dispatch a technician) Service Type Proc", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-473", "epic": "", "summary": "Filter Technician By Day/Time", "description": "As a CSC, when dispatching a technician, I want to be able to filter technicians by day and time so that I know which technicians are available for a delayed dispatch.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-471", "epic": "", "summary": "Dispatch Flow Update - Technician Schedules", "description": "As a CSC, I want the following updates to technician schedules so that I can dispatch technicians more effectively: Update ‘Schedule’ column to display: Time (change time format from military time to AM/PM time) Time zone (shorten the time zone from ‘America/Los Angeles’ to ‘PST’ or something like t", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/31/2025", "customer": "", "acceptanceCriteria": "", "comments": "[23/Feb/26 9:50 AM] confirm if this has already been done?", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-458", "epic": "", "summary": "CSC - View Notes - Efficiency Gains", "description": "As a CSC, I would like to be able to quickly and efficiently move through the View Notes list in 4.0, being able to take action and move to the next VN. Also remove the graphs on the right side of View Notes list so we can see the whole list. Current Behavior: 1) Open View notes list: Home> View Not", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/14/2025", "customer": "", "acceptanceCriteria": "# Popup window stops going back to home when closed. # I can take action within the quick edit to address the view note.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-456", "epic": "", "summary": " RITM0024402 Track call backs for same issue", "description": "Requesting Customer: Hillsborough County Public Schools User Story: If AHU-1 goes down today and is repaired, but a new work order (WO) is submitted tomorrow for the same issue or location, those WOs need to be linked. We need the ability to report on these linked WOs so that HCPS can review callbac", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "07/11/2025", "customer": "", "acceptanceCriteria": "A callback should be defined as any WO submitted within 5 business days of a previous one for the same asset or location. When this occurs: The new WO should be flagged as a callback in the system. It should be linked to the original WO for that asset or location. In cases where asset information is not immediately available, the system should use location within the building as a fallback for lin", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-455", "epic": "", "summary": "RITM0024401 Flag WOs for us to review with vendors", "description": "Requesting Customer: Hillsborough County Public Schools User Story: Our QA/QC team reviews completed Work Orders and flag ones that are failed or note are not sufficient. We review these with our vendors at QBRs. I need a way to flag these in the system and run a report on flagged WOs to easily trac", "status": "Blocked", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "07/11/2025", "customer": "", "acceptanceCriteria": "1. Add a flag that can be checked on a WO called \"QA/QC Concern\" 2. Be able to run a report on all WOs with a QA/QC Concern box checked", "comments": "[06/Oct/25 12:02 PM] can be developed\n\n[23/Feb/26 8:58 AM] Questions to ask HCPS before building: Process & Workflow Who can flag a WO as having a QA/QC concern? (Just QA/QC team, or supervisors, vendors too?) When does the flag typically happen? (During review, after completion, at any point?) Can a single WO have multiple concerns, or is it one flag per WO? What happens after you review with the vendor at QBR? Is the flag resolved/closed, or does it stay flagged for historical purposes? Do you need to track vendor responses or actions taken? (Does the vendor document what they did to fix it?", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-453", "epic": "", "summary": "RITM0024399 Expand date/time field in work order history", "description": "Requesting Customer: Hillsborough County Public Schools User Story: You cannot view the full date/time column when reviewing Work Order history field. You have to click into the field to see the full information. Possible solution would be to remove a field from the related list.", "status": "Blocked", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "07/11/2025", "customer": "", "acceptanceCriteria": "Date and time is fully visible without having to click into the field", "comments": "[17/Nov/25 1:22 PM] Needs research into technical approach, see spike IF 567\n\n[23/Feb/26 8:41 AM] Blocked - depends on [https://edoenergy.atlassian.net/browse/IF-567|https://edoenergy.atlassian.net/browse/IF-567|smart-link]", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-452", "epic": "", "summary": "RITM0024398 Mobile App - Ability to take images in an app", "description": "Requesting Customer: Hillsborough County Public Schools User Story: Our Techs need a better user experience for quickly taking images onsite and associating them to a work order. They are currently taking images of assets while onsite and have to go back to their desks to upload the pictures to the ", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "07/11/2025", "customer": "", "acceptanceCriteria": "1. Open Work Order in app 2. Scan QR code on an asset 3. Take or upload multiple pictures of that asset in the app and automatically associate it with the Work Order", "comments": "[06/Oct/25 12:02 PM] needs further investigation wrt licenses, etc.", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-445", "epic": "", "summary": "Hide ' Available' and 'Schedule' section from After Hours tab in dispatching module", "description": "Requesting Customer: UW School of Medicine - SLU User Story: Hide ' Available' and 'Schedule' section from After Hours tab in dispatching module", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "06/09/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: Hide ' Available' and 'Schedule' section from After Hours tab in dispatching module", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-443", "epic": "", "summary": "Warranty Flag for Warranty Expiration on  Service Request", "description": "Requesting Customer: Mortenson User Story: On the service request form (users do not go to home page prior to entering a new request, need the ability to identify when the whole project or a phase within the project is out of warranty. i.e. the location dropdown - we need a way to identify when the ", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "05/19/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: A note/flag appears on the service request to identify when the project or a phase within the project has expired warranty", "comments": "[15/Dec/25 1:24 PM] don’t need this feature yet for HCPS hybrid warranty\n\n[15/Jan/26 3:24 PM] This may be solved with the notification flag on site when the account IS under warranty, training that accounts without flag are not under warranty may be sufficient. Will follow up with Angela.\n\n[23/Feb/26 9:47 AM] talk more with Angela about this, did the most recent data fix fix this?", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-422", "epic": "IF-528", "summary": "Attachments to be included in PM WO's ", "description": "Requesting Customer: Skagit Valley Regional Health User Story: When attachments are part of maintenance plans, they should also be included in the generated work order.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "04/04/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: When attachments are part of maintenance plans, they should also be included in the generated work order.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-418", "epic": "", "summary": "RITM0023169 Acknowledgement to completion timeframe", "description": "Requesting Customer: Emerald User Story: As a property manager, I need to know how long it took for a work order to be in its 1st milestone of acknowledged status (not the LAST milestone of acknowledged status), to the last completed/closed milestone. The current dashboard shows when the work order ", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "03/26/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: The current dashboard shows when the work order was in acknowledged status at the most recent time (not the 1st milestone). This will give a true estimate of how long work orders go from acknowledged to completed status.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-417", "epic": "", "summary": " RITM0023169 Notify property manager when they can enter space", "description": "Requesting Customer: Emerald User Story: As an occupant/tenant, I need the capability to notify property management when they can enter my space.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "03/26/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: Add a box to service request page to \"Allow facilities team permission to enter my space at any time\" Does not have to be that exact wording, but something close", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-413", "epic": "IF-647", "summary": "Retired Assets trigger to end related MP", "description": "As an Admin, I need maintenance plans to end when related assets are set 0 on Active.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "03/24/2025", "customer": "", "acceptanceCriteria": "When an asset is set as inactive: Any related maintenance plans will populate with an end date. * Active and Auto-Generate set to false", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-410", "epic": "IF-409", "summary": "ICE to Torrens/Reveal (FCA) - Data Feeds", "description": "Want the ability to feed all ICE asset history to Reveal/Torrens. Work Orders Maintenance Change History (?)", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "03/11/2025", "customer": "", "acceptanceCriteria": "", "comments": "[11/Mar/25 9:57 AM] Needs further discovery. Since Torrens is source of truth, should asset field data be fed back, or just asset related data. What related data specifically needs to feed to Torrens?", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-406", "epic": "", "summary": "RITM0022945 QAQC Save and Assist option in WOs ", "description": "Requesting Customer: Hillsborough County Public Schools User Story: The QA/QC team needs a way to capture \"saves\" in work orders to help them provide assistance more effectively.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "03/06/2025", "customer": "", "acceptanceCriteria": "Acceptance Criteria: Add a dropdown selection in the \"QA/QC\" section of Work Orders (left-hand side of the page), similar to the ROC and Field Emergency Response Team. Please ensure the dropdown options mirror those of the Field Emergency Response Team, as shown in the red box.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-395", "epic": "", "summary": "Work Order Priority - Warranty Customers", "description": "# Need to keep the standard that “the priority of the work order should mirror the priority of the Service Type selected UNLESS the field is changed after the Service Type selection.”https://edoenergy.atlassian.net/browse/IF-329 # Add, for customers where “Use Warranty Flow” is checked, default WO p", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "02/18/2025", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-387", "epic": "", "summary": "RITM0022615 High Energy Indicator ", "description": "Hillsborough County Public Schools I need the ability to track and prioritize work orders that are resulting in high energy usage/cost", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "02/06/2025", "customer": "", "acceptanceCriteria": "1. Ability to add a checkbox/radio button if a work order is resulting in high energy usage/cost 2. Ability to filter to understand and prioritize high energy use issues (e.g. chiller issue resulting in 24/7 operation)", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-386", "epic": "", "summary": "REQ0021677 Compliance Maintenance Tracking", "description": "Hillsborough County Public Schools I need the ability to track compliance required maintenance items as separate from non-compliance items.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "02/06/2025", "customer": "", "acceptanceCriteria": "1. Ability to track compliance required maintenance items separate from non-compliance maintenance 2. Provide specific reporting on compliance maintenance schedule and status 3. Provide ability to upload forms and complete forms online documenting compliance requirements met in maintenance activity", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-370", "epic": "IF-528", "summary": "Work Order - Dynamic Work Step", "description": "As a Property Manager and above, I need the ability to remove/delete a work step from a work order and to be able to mark as Not Applicable. I also need to be able to set a Work Step input type (picklist or radio buttons?) with a yes/no option.", "status": "Ready For Development", "priority": "Medium", "storyPoints": "3", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "01/16/2025", "customer": "", "acceptanceCriteria": "", "comments": "[10/Mar/25 11:04 AM] I think we could do some sort of radio button here and record the response in a new field. As well not applicable sounds not too bad, but would require additional logic to all the classes involved.", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-365", "epic": "", "summary": "Property Manager Dashboard - Report Update", "description": "Account Sharing is set up to share accounts where the Customer picklist = Emerald. Since Occupant and Vendor companies do not always have a 1 to 1 Customer relationship (think McKinstry being related to HCPS, Emerald, McKinstry, ROC clients, etc) we cannot really set them with a Customer. Create a f", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "01/07/2025", "customer": "", "acceptanceCriteria": "", "comments": "[19/Feb/26 9:38 AM] this is specific to dashboard report Work Orders - Requestor. I am able to get the “account name: account name” field to display properly internally. However, whenever I impersonate a property manager (example: Jason Jackon) he does not see the same data that I see. Even for non-mckinstry accounts (example Avista)", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-350", "epic": "", "summary": "Portal - Create Maintenance Screen Flow", "description": "Apache As a portal user, I would like to be taken to the new MP record, after it is created, to save time needing to search for it to complete set up/provisioning.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "11/19/2024", "customer": "", "acceptanceCriteria": "After new MP is created, the user is taken to the record.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-346", "epic": "", "summary": "Work Order Location Account Editing", "description": "As an internal user I want the Work Order account field to be locked to only accounts under the selected Site field. Currently, in a work order an internal user can update the account to any location - as far as i can see. Account Field should be tied to the selected Site. Edo", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "11/15/2024", "customer": "", "acceptanceCriteria": "Account field only shows location's related to site.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-345", "epic": "", "summary": "SR Creation - Requestor/Contact Flexibility for Property Manager", "description": "As a portal user, Property Manager and above, I want the ability to add a different requestor on the service request.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "11/15/2024", "customer": "", "acceptanceCriteria": "Log in as a Property Manager and have the option to select self or any contact related to building selected.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-335", "epic": "", "summary": "Service Request priority vs. WO priority", "description": "When a service requestor selects emergency as a priority and the CSC creates the work order with a service type that has \"normal\" as the priority associated, the technician should be notified the Service request was submitted as a priority and the work order was created with a normal priority. Sugge", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "10/23/2024", "customer": "", "acceptanceCriteria": "Email that goes out to the technician should indicate both priorities. Work order should indicate both service request priority and work order priority.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-327", "epic": "", "summary": "Site/Customer/Procedure/Temp Notes - Reformatting", "description": "\"User Story: As a CSC, I would like the text formatting enhanced for better visual clarity, enabling CSCs to easily locate the relevant information in temp notes. Current Behavior: A center-aligned sentences of notes that merge together without any visual distinction, spacing or bolded action headin", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "10/09/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-324", "epic": "", "summary": "Add Assigned Status", "description": "User Story: For all roles I want an Assigned Status option. To be able to re-assign Work Orders to a different tech that have already been dispatched or acknowledged.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "10/09/2024", "customer": "", "acceptanceCriteria": "Assigned Status to be added. Status should be able to be provisioned in the preferences and available in the top status bar.", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-317", "epic": "IF-528", "summary": "Maintenance Plan WO Generation and Notification Enhancement", "description": "\"User Story: As anyone with access to Maintenance Plans I want to change the wo generation date/time and when the notification regarding this new PM is generated for the assigned tech Current Behavior: Current State: A PM work order generates based off of the Maintenance Work Rule. If a Maintenance ", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "10/04/2024", "customer": "", "acceptanceCriteria": "", "comments": "[15/Nov/24 10:31 AM] -Would like the ability to set Generation timeframe to 0 so that WO are generated on the day scheduled and not prior if preferred.-\n\n[17/Dec/24 8:31 AM] Addition to ask: User Story: As a portal user receiving PM notification emails, I would like the emails to only come on weekdays. Current Behavior: Assigned PM Work Orders email comes out on weekends. Expected Behavior: Assigned PM Work Orders email comes out on weekends. Steps to Reproduce: PM gets generated PM notification goes out to portal user PM notification can go out out on the weekends Acceptance Criteria: set not", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-310", "epic": "", "summary": "Account Preference on Work Order - Close 7 Days After Completion V2", "description": "As a Customer, If toggled on, I need to be able to set both the amount of days before closure, as well as restrict this to a specific work order type(s)", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "09/20/2024", "customer": "", "acceptanceCriteria": "Ability to set auto close to only be on specific work order record type Ability to set auto-close days (Ops to provide standard list of timeframes or advise if needs to be fully customized to select any #days) Ability to override customer preference at the Site level", "comments": "[23/Feb/26 9:38 AM] let’s mark this as closer term, and confirm it’s refined\n\n[23/Feb/26 9:38 AM] (flag) Flag added needs refinement, closer term work", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-306", "epic": "", "summary": "Email Governor Limits Issue - Review", "description": "Users noted errors when creating, dispatching, and preforming other actions on Work Orders. I looked into our governor limits and found we had hit the 5k daily limit for SingleSendEmail Actions. Narrowed the issue down to 3 flows that were attempting to send the email. Work Order - Email Alerts Work", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Bugs", "createdDate": "09/10/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-300", "epic": "", "summary": "Mass Status Updates - Enhancement", "description": "\"User Story: As an external user (PM, technician, vendor) I want a dropdown pick list in the Mass Status Update section for the following fields: Account Name Status Name Status Current Behavior: Field does not have a dropdown pick list, user will need to know the format and naming convention for th", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/29/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-299", "epic": "", "summary": "Work Order Record Printing", "description": "User Story: As a User I want the ability to select fields to display when printing (creating pdf) a Work Order (PM). I also want to be able to select/print multiple Work Orders at once. Current Behavior: Go into Work Order > Create Service Report > Select Template Type > generates Service Report pdf", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/29/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-285", "epic": "", "summary": "GL-290 - Dispatch - Resource Company Field Needed", "description": "All Roles Property manager and above. I want to be able to see the Service Resource Company when dispatching a contact so I can ensure the correct company/contact is selected. Add Company Field to dispatch tables.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-284", "epic": "", "summary": "GL-289 - Work Order - Related Account Work Type", "description": "All roles; I want to be able to search for a Service Type in a Work Order to quickly select Service Types as I may not know which Issue Type it falls under. Current state: Select Issue Type > Select Service Type from dropdown.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-280", "epic": "", "summary": "GL-243 - Work Order Dispatch - Module Updates", "description": "\"Goal: have a clear flow and understanding for the CSCs to navigate dispatching a clients technicians regardless of the time of the day. Issues: Confusions between the multiple tables of dispatches and when to use them. Avoid needing to use generic dispatch options like \"On call dispatch\" that are f", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-279", "epic": "", "summary": "GL-242 - Dispatch Module - Resource Schedule Visibility", "description": "AS a CSC, I want a 'cleaner' list when looking at the Service Resource Schedule, so that I can easily read it.. Fritz Magluyan 2024-07-01 07:00:00Z - 2058-09-06 15:30:00Z M:True Tu:True W:True Th:True F:True Sa:False Su:False", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-277", "epic": "", "summary": "GL-238 - Email Notification Received -  Visibility on Email", "description": "As an External User (Requester, Occupant, etc) I want the ability to view all email contacts (To Line and cc) an email notification was sent to.", "status": "Blocked", "priority": "Highest", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "Resource and all notifications need to be aware of who was notified. Need a “Reply All” option where any response to the notification notifies other contacts on notifications of said response.", "comments": "[23/Jun/25 8:40 AM] New Question: How often will these emails need to go out? Because we can do it but it will eat up our single send emails. of which we are now allotted an extended 8k a day. So we need to get some info, (for simple numbers I will use 10 schools, with emails going to 10 people). If All 10 schools lose power, and it sends an email to all 10 people at each school. That is already 100 emails. As long as we don’t need Salesforce to respond to back to reply alls, that would be fine. If there are say 100 schools each with a 100 people to notify and they all go out, then just the im", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-275", "epic": "", "summary": "GL-234 - Work Order Note - Readability", "description": "As All Personas, I want the the Notes section to have a clear delineation (space or line break) between notes.", "status": "New", "priority": "Lowest", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-272", "epic": "", "summary": "GL-282 - Occupant SR Field Read/Write Permissions", "description": "As an occupant or occupant manager, I should not have the ability to modify a service request. The fields in the attachment should NOT be modifiable.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-271", "epic": "", "summary": "GL-281 - CSC Queue Lists", "description": "As a CSC I need to not see HCPS in the Home object (Incoming, Open Work Orders, Follow Up, View Notes, Quotes and Delay Dispatch) field from Mo - Fri, between 3am - 2pm (Pacific).", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-266", "epic": "", "summary": "GL-272 - Service Request - WO Note Time/Date", "description": "As a occupant or occupant manager, I want the ability to have a date/timestamp and note of who made the WO note on my Service Request.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-263", "epic": "", "summary": "GL-264 - SR (WO Notes)", "description": "As an Occupant, I want the capability to see all applicable Work Order notes in the Service Request.Refer to IF-221. I passed it with a feedback - SR Work Order Notes only show most recent note - Is that by design?", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-259", "epic": "", "summary": "GL-221 - Work Order History", "description": "As any persona, when looking at a work order history, we need the capability to not only see that the work order description was updated, but from what it was updated from, to what it was updated to for documentation purposes.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "08/07/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-252", "epic": "", "summary": "Update WO Email Notification Template", "description": "Update WO Email Notification Templates (Not to resource assigned): Email Notifications to STD related email notifications - WO number should be a link * Add text \"This is a XX Priority Work Order. It has been assigned to XX and you were listed as important to notify.\"", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "07/26/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-234", "epic": "", "summary": "Warranty Workflow", "description": "As a CSC/PM/CSC Lead/Account Manager/Admin - I need to be able to log warranty validation results before escalating the work order to Regular Procedures. Warranty workorder workflow: SR submitted > Warranty work order record type created > Work order dispatched using appropriate service type and war", "status": "Ready For Development", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "", "createdDate": "07/03/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-223", "epic": "", "summary": "Resolution Note - Record Type Toggle", "description": "Toggle for PMs and Corrective work orders separately. Customer may select if the note is required for PMs and not Corrective, Corrective and not PMs or both.\"", "status": "New", "priority": "Medium", "storyPoints": "4", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "05/29/2024", "customer": "", "acceptanceCriteria": "", "comments": "[06/Aug/24 8:42 AM] This sounds easy enough with our account preferences. We will just add on to the validation rule. And add a second one. Each validation rule will be for a different record type. And then it will look up to the customer preferences for if it should require a res note.", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-207", "epic": "", "summary": "QR Code Capability for Check-In/Check-Out Process", "description": "As a user (Technician/Vendor/Property Manager), I want the capability to scan a QR code to check into a site and document the check-in using Salesforce Lightning. Additionally, I need a list of persons who have checked in for that facility, along with the ability to mark a person as checked out when", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "04/22/2024", "customer": "", "acceptanceCriteria": "# Acceptance Criteria: ## Create a custom object in Salesforce to store check-in records. ## Generate a unique QR code for each person visiting the facility. ## Use a Lightning component or Visualforce page to scan the QR code and record the check-in time. ## Maintain a list of persons checked in for that facility. ## Provide a way to mark a person as checked out when they leave. # Example Flow: #", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-206", "epic": "", "summary": "HCPS/McKinstry Requestor Survey", "description": "As a service provider, I need to be able to create surveys and follow up, store, and report on survey results.", "status": "New", "priority": "Medium", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "04/22/2024", "customer": "", "acceptanceCriteria": "Workflow: Work Order placed into Completed status > Email/Survey sent to requestor > If any “no” responses an email is triggered to HCPS Controllers and Lakisha for them to take action/follow up. Surveys should only trigger on 10% of the customers work orders per month. Surveys should exclude Quote record type. Survey results should be stored and able to be reported on. 3 – 4 questions (to be prov", "comments": "[30/Jul/24 10:59 AM] I will need to do a fair amount of research how best accomplish this. Sending out a custom questions tied to particular work order, and limiting to 10% of work orders will both be difficult to accomplish. I am not quite ready to drop estimations for this. But certainly a large task.\n\n[30/Jul/24 12:36 PM] One of the major questions i have here is confirming, will all requestors have logins? This may be something we can create a custom object and allow access to the page via the community. Not a full solution but it would be a good start if thats an option\n\n[05/Aug/24 11:19 ", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-196", "epic": "", "summary": "QA/QC (ROC) - Toggle", "description": "As an Internal user, I need to be able to \"toggle\" the QA/QC section of the WO either on or off for the customer audience.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "03/11/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-191", "epic": "", "summary": "Automated Escalation Notes - Dispatch", "description": "As a CSC, for escalated or follow up email dispatches, I want the system to auto generate a note in the email notification that this was previously dispatched.", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "02/26/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-185", "epic": "", "summary": "List View Scrolling", "description": "\"As a CSC, I want the scroll bar in the bottom of the dispatch page. so that I don't have to find where each section of a table to find the scroll bar and find it again for the next table. Would like to create efficiency in the process.\"", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "02/26/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-183", "epic": "", "summary": "CSC - WO Notes Queue", "description": "\"As a CSC I need to know how many times a note is updated, to ensure I review all notes that may need action taken on them. Example: Two notes are added within a few minutes of each other, both requiring action. Queue only displays the WO once, CSC reviews most recent note and takes action but no ac", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "02/26/2024", "customer": "", "acceptanceCriteria": "", "comments": "", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-179", "epic": "", "summary": "CSC Home - Elapsed Time", "description": "As a CSC I want to see an elapsed time column for all queues - SR, WO, Follow Up, Notes Need Review and Delay Dispatch", "status": "New", "priority": "Low", "storyPoints": "", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "Prioritized Backlog", "createdDate": "02/26/2024", "customer": "", "acceptanceCriteria": "", "comments": "[26/Feb/24 7:52 AM] “As a CSC/CSC Manager, I want visual indicators (text color) when a work order elapses the follow up time so that I can easily identify a work order that needs to be followed up on.”", "edoNotes": "", "mckNotes": ""}, {"ifid": "IF-128", "epic": "", "summary": "4.4 Parent/child WO visible together", "description": "As an ROC engineer, I want to view notes added to a parent work order on a child work order so that I do not have to return to the parent work order whenever I need to view notes for context around work needed.", "status": "New", "priority": "Medium", "storyPoints": "6", "swimlane": "Proactive WO, SLA & Compliance", "sprint": "McKinstry Backlog", "createdDate": "11/06/2023", "customer": "", "acceptanceCriteria": "", "comments": "[06/Nov/23 10:01 AM] Appears straightforward. No further questions at this time.\n\n[06/Nov/23 10:01 AM] S\n\n[06/Nov/23 10:01 AM] - Salesforce limitation. Notes from child work orders can be viewed on the parent work order but the inverse is not available natively. We will have to build a custom tool to make this work- We can build a tool to see all related notes\n\n[06/Aug/24 8:48 AM] I think this would require a flow on the side to show all the notes related to the const SWIMLANE_CLASS = {
  'Proactive WO, SLA & Compliance':   'sl-proactive',
  'Asset Management':                 'sl-asset',
  'Vendor Management & Facilitation': 'sl-vendor',
  'Data Infrastructure':              'sl-data',
  'Client Implementations':           'sl-client',
  'Platform Enhancements':            'sl-platform',
};
function statusBadge(s) {
  const m = {'New':'badge-new','In Progress':'badge-inprogress','Test in Staging':'badge-staging','Ready For Development':'badge-ready','Blocked':'badge-blocked','Extended':'badge-extended'};
  return `<span class="badge ${m[s]||'badge-default'}">${s||'&#x2014;'}</span>`;
}
function prioritySpan(p) {
  const m = {'Highest':'pri-highest','High':'pri-high','Medium':'pri-medium','Low':'pri-low','Lowest':'pri-lowest'};
  return `<span class="priority ${m[p]||''}">${p||'&#x2014;'}</span>`;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) {
  if (!d) return '';
  const p = d.split('/');
  return p.length===3 ? `${p[1]} ${parseInt(p[0])}, '${p[2]}` : d;
}
function openModal(ifid) {
  const r=ALL_DATA.find(x=>x.ifid===ifid); if(!r) return;
  document.getElementById('mIfid').textContent=r.ifid+(r.epic?' · Epic: '+r.epic:'');
  document.getElementById('mTitle').textContent=r.summary;
  let body=`<div class="modal-meta">${statusBadge(r.status)}${prioritySpan(r.priority)}${r.sprint?`<span class="badge badge-default">${esc(r.sprint)}</span>`:''}${r.storyPoints?`<span class="badge badge-default" style="background:#EAF4FB;color:#1A5276">SP: ${esc(r.storyPoints)}</span>`:''}${r.customer?`<span class="badge badge-default" style="background:#F5EEF8;color:#6C3483">&#x1F464; ${esc(r.customer)}</span>`:''}${r.createdDate?`<span style="font-size:11px;color:#888;margin-left:auto">${formatDate(r.createdDate)}</span>`:''}</div>`;
  if(r.description) body+=`<div class="modal-section"><div class="modal-section-label">Description</div><div class="modal-section-body">${esc(r.description)}</div></div>`;
  if(r.acceptanceCriteria) body+=`<div class="modal-section"><div class="modal-section-label">Acceptance Criteria</div><div class="modal-section-body">${esc(r.acceptanceCriteria)}</div></div>`;
  if(r.edoNotes||r.mckNotes){body+=`<div class="modal-section"><div class="modal-section-label">Notes</div>`;if(r.edoNotes) body+=`<div class="modal-note-block edo"><div class="modal-note-label">Edo Notes</div>${esc(r.edoNotes)}</div>`;if(r.mckNotes) body+=`<div class="modal-note-block mck"><div class="modal-note-label">McK Notes</div>${esc(r.mckNotes)}</div>`;body+=`</div>`;}
  if(r.comments){const lines=r.comments.split('\n').filter(Boolean);body+=`<div class="modal-section"><div class="modal-section-label">Comments</div>`;lines.forEach(line=>{const m=line.match(/^\[([^\]]+)\]\s*(.*)$/);if(m) body+=`<div class="modal-comment"><div class="modal-comment-date">${esc(m[1])}</div>${esc(m[2])}</div>`;else body+=`<div class="modal-comment">${esc(line)}</div>`;});body+=`</div>`;}
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModalDirect(); });
document.addEventListener('DOMContentLoaded', function(){
const sprints = [...new Set(ALL_DATA.map(r=>r.sprint).filter(Boolean))].sort();
const sprintSel = document.getElementById('sprintFilter');
const noSprintOpt = document.createElement('option'); noSprintOpt.value='__none__'; noSprintOpt.textContent='No Sprint Assigned'; sprintSel.appendChild(noSprintOpt);
sprints.forEach(s => { const o=document.createElement('option'); o.value=o.textContent=s; sprintSel.appendChild(o); });
let collapsedSwimlanes = new Set();
function getFiltered() {
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const sl=document.getElementById('swimlaneFilter').value;
  const st=document.getElementById('statusFilter').value;
  const pr=document.getElementById('priorityFilter').value;
  const sp=document.getElementById('sprintFilter').value;
  return ALL_DATA.filter(r => {
    if(sl && r.swimlane!==sl) return false;
    if(st && r.status!==st) return false;
    if(pr && r.priority!==pr) return false;
    if(sp) { if(sp==='__none__' ? (r.sprint && r.sprint.trim()!=='') : r.sprint!==sp) return false; }
    if(q) { const h=[r.ifid,r.summary,r.description,r.customer,r.edoNotes,r.mckNotes,r.sprint,r.status].join(' ').toLowerCase(); if(!h.includes(q)) return false; }
    return true;
  });
}
function groupBySwimlane(rows) {
  const order=['Proactive WO, SLA & Compliance','Asset Management','Vendor Management & Facilitation','Client Implementations','Data Infrastructure','Platform Enhancements'];
  const g={};
  rows.forEach(r=>{ if(!g[r.swimlane]) g[r.swimlane]=[]; g[r.swimlane].push(r); });
  return order.filter(k=>g[k]).map(k=>({name:k,rows:g[k]}));
}
function renderTable(rows, slName) {
  let html=`<div class="table-wrap"><table><colgroup><col class="col-ifid"><col class="col-status"><col class="col-priority"><col class="col-sprint"><col class="col-sp"><col class="col-customer"><col class="col-created"><col class="col-summary"></colgroup><thead><tr><th data-col="ifid">ID <span class="sort-icon">&#x21D5;</span></th><th data-col="status">Status <span class="sort-icon">&#x21D5;</span></th><th data-col="priority">Priority <span class="sort-icon">&#x21D5;</span></th><th data-col="sprint">Sprint <span class="sort-icon">&#x21D5;</span></th><th data-col="storyPoints" style="text-align:center">SP <span class="sort-icon">&#x21D5;</span></th><th data-col="customer">Customer <span class="sort-icon">&#x21D5;</span></th><th data-col="createdDate">Created <span class="sort-icon">&#x21D5;</span></th><th data-col="summary">Summary &amp; Description <span class="sort-icon">&#x21D5;</span></th></tr></thead><tbody>`;
  rows.forEach(r => {
    const hasNotes=r.edoNotes||r.mckNotes;
    html+=`<tr class="${hasNotes?'has-notes':''}" onclick="openModal('${esc(r.ifid)}')" style="cursor:pointer"><td class="td-ifid">${esc(r.ifid)}</td><td>${statusBadge(r.status)}</td><td>${prioritySpan(r.priority)}</td><td class="td-sprint">${esc(r.sprint)||'&#x2014;'}</td><td class="sp-cell">${r.storyPoints||'&#x2014;'}</td><td class="td-customer">${esc(r.customer)||'&#x2014;'}</td><td class="td-created">${formatDate(r.createdDate)||'&#x2014;'}</td><td class="td-summary">${r.epic?`<span class="epic-tag">${esc(r.epic)}</span>`:''}  <span class="summary-text">${esc(r.summary)}</span>${r.description?`<span class="desc-text">${esc(r.description.substring(0,140))}${r.description.length>140?'&#x2026;':''}</span>`:''}</td></tr>`;
    if(hasNotes) html+=`<tr class="notes-row"><td colspan="8"><div class="notes-inner">${r.edoNotes?`<div class="note-block edo"><div class="note-label">Edo Notes</div><div class="note-text">${esc(r.edoNotes)}</div></div>`:''}${r.mckNotes?`<div class="note-block mck"><div class="note-label">McK Notes</div><div class="note-text">${esc(r.mckNotes)}</div></div>`:''}</div></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}
function render() {
  const filtered=getFiltered(); const groups=groupBySwimlane(filtered);
  const main=document.getElementById('mainContent'); const noRes=document.getElementById('noResults');
  document.getElementById('visibleCount').textContent=filtered.length;
  document.getElementById('resultsBadge').innerHTML=filtered.length<ALL_DATA.length?`Showing <strong>${filtered.length}</strong> of ${ALL_DATA.length} tickets`:'';
  if(filtered.length===0){ main.innerHTML=''; noRes.classList.add('visible'); return; }
  noRes.classList.remove('visible');
  main.innerHTML=groups.map(g=>{
    const slClass=SWIMLANE_CLASS[g.name]||'';
    const isCollapsed=collapsedSwimlanes.has(g.name);
    return `<section class="swimlane-section ${slClass} ${isCollapsed?'collapsed':''}" data-sl="${esc(g.name)}"><div class="swimlane-header" onclick="toggleSwimlane('${esc(g.name)}')"><div class="swimlane-bar"></div><span class="swimlane-name">${esc(g.name)}</span><span class="swimlane-count">${g.rows.length}</span><span class="swimlane-toggle">&#x25BE;</span></div><div class="swimlane-body">${renderTable(g.rows,g.name)}</div></section>`;
  }).join('');
  main.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',e=>{
      e.stopPropagation(); const col=th.dataset.col;
      const section=th.closest('.swimlane-section'); const slName=section.dataset.sl;
      const group=groups.find(g=>g.name===slName);
      if(!group) return;
      const curDir=th.dataset.dir==='1'?-1:1; th.dataset.dir=curDir;
      group.rows.sort((a,b)=>{ let va=a[col]||'',vb=b[col]||''; if(col==='storyPoints'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;} return String(va).localeCompare(String(vb),undefined,{numeric:true})*curDir; });
      section.querySelector('.swimlane-body').innerHTML=renderTable(group.rows,slName);
    });
  });
}
function toggleSwimlane(name) {
  if(collapsedSwimlanes.has(name)) collapsedSwimlanes.delete(name); else collapsedSwimlanes.add(name);
  document.querySelector(`.swimlane-section[data-sl="${CSS.escape(name)}"]`).classList.toggle('collapsed');
}




function exportCSV(){
  const rows=getFiltered();
  const headers=['IFID','Summary','Status','Priority','Sprint','Story Points','Swimlane','Customer','Created','Description','Acceptance Criteria','Edo Notes','McK Notes','Comments'];
  const lines=[headers.join(',')];
  rows.forEach(r=>{ const vals=[r.ifid,r.summary,r.status,r.priority,r.sprint,r.storyPoints,r.swimlane,r.customer,r.createdDate,r.description,r.acceptanceCriteria,r.edoNotes,r.mckNotes,r.comments].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"'); lines.push(vals.join(',')); });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='edo_infocentre_roadmap.csv'; a.click();
}
function resetFilters(){
  document.getElementById('searchInput').value='';
  ['swimlaneFilter','statusFilter','priorityFilter','sprintFilter'].forEach(id=>document.getElementById(id).value='');
  render();
}
['searchInput','swimlaneFilter','statusFilter','priorityFilter','sprintFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});
render();
});
</script>
